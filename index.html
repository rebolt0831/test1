<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="jD0V2QANDvKtEC8ZcUBWf_XNZXmUTMlgfTkj7qdZT8g" />
  
<title>sceneagb</title>

<meta name="description" content="Download high quality scenepacks of Ariana Grande for editing.">

<meta name="keywords" content="scenepacks, editing clips, ariana scenepacks, ariana grande scenepacks, editing resources, ariana grande">

<meta name="author" content="Sceneagb">
  
<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
position:relative;
height:1050px;
display:flex;
justify-content:center;
padding:20px;
}

header::before{
content:"";
position:absolute;
inset:0;
background:url("images/banner.gif") center/cover no-repeat;
z-index:-1;
}

/* DESKTOP LOGO */

.logo{
position:absolute;
left:30px;
top:18px;
font-size:26px;
font-weight:600;
color:black;
}

/* MENU */

nav{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
}

nav a{
margin:0 18px;
text-decoration:none;
color:black;
font-weight:600;
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
margin:30px 0;
}

.search-box input{
width:50%;
padding:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:white;
font-size:16px; /* prevents mobile zoom */
}

/* GRID */

.grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
padding:40px 20px;
}

/* CARD */

.card{
border-radius:16px;
overflow:hidden;
transition:.35s;
}

.card:hover{
transform:scale(1.08);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
display:block;
}

/* MOBILE */

@media (max-width:768px){

header{
height:140px;
}

/* MENU RIGHT */

nav{
right:20px;
left:auto;
transform:none;
top:20px;
}

/* LOGO INLINE */

.logo{
position:absolute;
left:20px;
top:18px;
font-size:18px;
}

.search-box input{
width:80%;
font-size:16px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">sceneagb</div>

<nav>
<a href="/">Home</a>
<a href="/socials/">Socials</a>
<a href="/about/">About</a>
</nav>

</header>

<div class="search-box">
<input id="search" placeholder="Search scenepacks...">
</div>

<section class="grid" id="grid"></section>

<script>

const grid=document.getElementById("grid")
const searchInput=document.getElementById("search")

let packs=[]
let currentIndex=0
const packsPerLoad=12

async function loadData(){

const response=await fetch("packs.json")
packs=await response.json()

loadMore()

}

function createCard(pack){

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<a href="${pack.link}" target="_blank">
<img src="${pack.img}">
</a>
`

grid.appendChild(card)

}

function loadMore(){

for(let i=0;i<packsPerLoad;i++){

if(currentIndex>=packs.length) return

createCard(packs[currentIndex])
currentIndex++

}

}

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){
loadMore()
}

})

searchInput.addEventListener("input",()=>{

const value=searchInput.value.toLowerCase()

const sorted=[...packs].sort((a,b)=>{

const aMatch=a.img.toLowerCase().includes(value)
const bMatch=b.img.toLowerCase().includes(value)

if(aMatch&&!bMatch) return -1
if(!aMatch&&bMatch) return 1
return 0

})

grid.innerHTML=""
sorted.forEach(pack=>createCard(pack))

})

loadData()

</script>

</body>
</html>
